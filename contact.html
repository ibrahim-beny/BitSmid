<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website laten bouwen? Neem contact op | BitSmid</title>
    <meta name="description" content="Neem contact op met BitSmid — jouw webbureau voor betaalbare MKB-websites. Wij reageren binnen 24 uur persoonlijk.">
    <meta property="og:title"       content="Website laten bouwen? Neem contact op | BitSmid">
    <meta property="og:description" content="Neem contact op met BitSmid — jouw webbureau voor betaalbare MKB-websites. Wij reageren binnen 24 uur.">
    <meta property="og:type"        content="website">
        <meta property="og:image"        content="https://www.bitsmid.nl/images/og-image.jpg">
    <meta property="og:image:width"   content="1200">
    <meta property="og:image:height"  content="630">
    <meta property="og:url"         content="https://www.bitsmid.nl/contact.html">
    <meta name="twitter:card"       content="summary_large_image">
    <link rel="canonical"           href="https://www.bitsmid.nl/contact.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="images/favicon-180.png">
</head>
<body class="bg-white text-dark font-sans antialiased overflow-x-hidden pt-20">

    <div id="site-header"></div>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 py-20">
        <div class="grid lg:grid-cols-2 gap-16">
            <div>
                <h1 class="font-display text-4xl lg:text-5xl font-bold mb-6" data-aos="fade-up">Neem contact op</h1>
                <p class="text-lg text-gray-600 mb-10">Heb je vragen over een website? Stuur ons een bericht en we reageren snel.</p>
                <div class="space-y-8">
                    <div><h3 class="font-bold">E-mail</h3><a href="mailto:info@bitsmid.nl" class="text-gray-500 hover:text-accent transition-colors">info@bitsmid.nl</a></div>
                    <div><h3 class="font-bold">Telefoon</h3><a href="tel:+31201234567" class="text-gray-500 hover:text-accent transition-colors">+31 20 123 4567</a></div>
                    <div><h3 class="font-bold">Adres</h3><span class="text-gray-500">Designstraat 42, Amsterdam</span></div>
                </div>
            </div>
            <div class="bg-white border border-gray-200 rounded-3xl p-8 shadow-sm" data-aos="fade-up" data-aos-delay="150">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2" for="contact-naam">Naam</label>
                        <input id="contact-naam" type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-accent focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2" for="contact-email">E-mailadres</label>
                        <input id="contact-email" type="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-accent focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2" for="contact-bericht">Bericht</label>
                        <textarea id="contact-bericht" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-accent focus:outline-none transition-colors resize-none"></textarea>
                    </div>
                    <div id="contact-feedback" class="hidden text-sm font-medium rounded-xl px-4 py-3"></div>
                    <button type="button" id="contact-btn" class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-accentHover transition-colors">Verstuur</button>
                </form>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/components.js"></script>
    <script>
    (function () {
      var btn = document.getElementById('contact-btn');
      var feedback = document.getElementById('contact-feedback');

      function showFeedback(message, isError) {
        feedback.textContent = message;
        feedback.className = [
          'text-sm font-medium rounded-xl px-4 py-3',
          isError
            ? 'bg-red-50 text-red-700 border border-red-200'
            : 'bg-green-50 text-green-700 border border-green-200'
        ].join(' ');
      }

      btn.addEventListener('click', function () {
        var naam    = document.getElementById('contact-naam').value.trim();
        var email   = document.getElementById('contact-email').value.trim();
        var bericht = document.getElementById('contact-bericht').value.trim();

        if (!naam || !email || !bericht) {
          showFeedback('Vul alle velden in.', true);
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Versturen\u2026';
        feedback.className = 'hidden';

        fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ naam: naam, email: email, bericht: bericht })
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.success) {
            showFeedback('Bedankt! We nemen zo snel mogelijk contact met je op.', false);
            document.getElementById('contact-naam').value = '';
            document.getElementById('contact-email').value = '';
            document.getElementById('contact-bericht').value = '';
            btn.textContent = 'Verstuur';
          } else {
            showFeedback(data.error || 'Er ging iets mis. Probeer het opnieuw.', true);
            btn.disabled = false;
            btn.textContent = 'Verstuur';
          }
        })
        .catch(function () {
          showFeedback('Netwerkfout. Controleer je verbinding en probeer opnieuw.', true);
          btn.disabled = false;
          btn.textContent = 'Verstuur';
        });
      });
    })();
    </script>
</body>
</html>
